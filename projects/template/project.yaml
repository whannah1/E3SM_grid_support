# =============================================================================
# SWAG Project Configuration
# =============================================================================
# Copy this file into your project directory and fill in the fields marked
# REQUIRED. Everything else can be left blank to inherit the machine default
# from swag/machines.yaml.
#
# Override rule: a blank value ("") defers to the machine default. Set a
# non-blank value here only when you need project-specific behavior.
#
# Usage:
#   python show_config.py            # print all resolved values
#   python check_paths.py            # check which paths exist on disk
# =============================================================================

# --- Project identity --------------------------------------------------------

project:
  name:      "UNSET"    # REQUIRED — short tag used for data directory naming
                        #   e.g. "2026-INCITE-CONUS-RRM" or "2025-ne30-test"
  timestamp: "YYYYMMDD" # REQUIRED — yyyymmdd, set when you start the project
                        #   e.g. "20260204" — used as a suffix on output files

# --- Grid configuration ------------------------------------------------------

grid:
  name: "UNSET"           # REQUIRED — atmosphere np4 grid name
                          #   e.g. "ne30", "ne120_CONUS_RRM_v1"
  name_pg2: ""            # physics grid name; defaults to <name>pg2 if blank
                          #   e.g. "ne30pg2"

  # Component grids — required for map and domain file generation
  ocn_name: ""            # ocean grid name, e.g. "oEC60to30v3"
  ocn_file: ""            # path to ocean SCRIP grid file
  lnd_name: ""            # land grid name, e.g. "r05_r05"
  lnd_file: ""            # path to land SCRIP grid file

  # SPA grid — optional, only needed for EAMxx SPA maps (defaults to ne30pg2)
  spa_name: ""            # SPA source grid name
  spa_file: ""            # path to SPA SCRIP grid file

# --- Machine override (optional) ---------------------------------------------
# Set name only if auto-detection fails or you need to force a specific machine.
# Auto-detection probes known HPC paths; valid values: NERSC, LCRC, ALCF, OLCF.

machine:
  name: ""

# --- Path overrides (optional) -----------------------------------------------
# All values below default to "" (use machine default from swag/machines.yaml).
# Override here when this project needs a non-default location.
#
# Common override example: point grid_data_root at a shared project allocation
# rather than your personal scratch space:
#   grid_data_root: "/global/cfs/cdirs/e3sm/my_project/grid_data"

paths:
  grid_code_root:  ""   # path to this E3SM_grid_support repo checkout
  grid_data_root:  ""   # root directory for all output data files
  e3sm_src_root:   ""   # path to E3SM source tree (for building homme_tool etc.)
  DIN_LOC_ROOT:    ""   # official E3SM input data directory
  unified_bin:     ""   # E3SM unified environment bin directory
  unified_src:     ""   # E3SM unified environment source script
  homme_tool_root: ""   # pre-built homme_tool directory (auto-derived from
                        #   e3sm_src_root/cmake_homme if left blank)
  mbda_path:       ""   # path to pre-built MBDA binary
  topo_file_src:   ""   # high-resolution source topography file (RLL format)

# --- SLURM overrides (optional) ----------------------------------------------

slurm:
  mail_user:  ""    # email address for job notifications
  mail_type:  ""    # notification events, e.g. "END,FAIL"
  account:    ""    # SLURM account / allocation name
  constraint: ""    # node constraint, e.g. "cpu" on NERSC Perlmutter
  qos:        ""    # SLURM QOS, e.g. "regular" or "debug"
